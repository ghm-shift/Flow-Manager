<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Projets - Flow Manager</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <nav id="sidebar">
            <button id="close-sidebar" class="btn-icon">❮</button>
            <h1>Flow Manager</h1>
            <a href="../index.html">Tableau de bord</a>
            <a href="clients.html">Clients</a>
            <a href="vuProjet.html">Projets</a>
            <a href="suiviFactures.html">Factures</a>
            <a href="depenses.html">Dépenses</a>

            <a href="utilisateurs.html" id="link-admin" style="border-top: 1px solid rgba(255,255,255,0.1); margin-top: 20px; padding-top: 20px;">Accès Utilisateurs</a>
        
        <a href="#" id="btn-logout" style="margin-top: auto; color: #ff4d4d; font-weight: bold;">Se déconnecter</a>
        </nav>

        <main>
            <button id="open-sidebar" class="btn-icon">❯</button>

            <header>
                <h1>Gestion des Projets</h1>
                <button id="toggle-form" class="btn-primary">+ Ajouter un projet</button>
            </header>

            <section id="add-form-section" hidden style="margin-bottom: 3rem;">
                <h3>Ajouter / Modifier un Projet</h3>
                <form action="#">
                    <label>Nom du projet</label>
                    <input type="text" placeholder="ex: Refonte site web" required>
                    
                    <label>ID du Client</label>
                    <input type="number" placeholder="ex: 1" required>
                    
                    <label>Statut</label>
                    <select required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px;">
                        <option value="En attente">En attente</option>
                        <option value="En cours" selected>En cours</option>
                        <option value="Terminé">Terminé</option>
                    </select>

                    <label>Budget</label>
                    <input type="number" placeholder="0.00" step="0.01">

                    <label>Commentaires</label>
                    <textarea placeholder="Notes sur le projet..." rows="3" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px;"></textarea>
                    
                    <button type="submit">Enregistrer le projet</button>
                </form>
            </section>

            <section style="display: block;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom du Projet</th>
                            <th>ID Client</th>
                            <th>Statut</th>
                            <th>Budget</th>
                            <th>Commentaires</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
