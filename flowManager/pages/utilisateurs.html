<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Utilisateurs - Flow Manager</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <nav id="sidebar">
            <button id="close-sidebar" class="btn-icon">❮</button>
            <h1>Flow Manager</h1>
            <a href="../index.html">Tableau de bord</a>
            <a href="clients.html">Clients</a>
            <a href="vuProjet.html">Projets</a>
            <a href="suiviFactures.html">Factures</a>
            <a href="depenses.html">Dépenses</a>
            <a href="utilisateurs.html" id="link-admin" style="border-top: 1px solid rgba(255,255,255,0.1); margin-top: 20px; padding-top: 20px;">Accès Utilisateurs</a>
            
            <a href="#" id="btn-logout" style="margin-top: auto; color: #ff4d4d; font-weight: bold;">Se déconnecter</a>
        </nav>

        <main>
            <button id="open-sidebar" class="btn-icon">❯</button>
            <header>
                <h1>Gestion des Utilisateurs</h1>
                <button id="toggle-form" class="btn-primary">+ Créer un compte</button>
            </header>

            <section id="add-form-section" hidden>
                <form action="#">
                    <label>Email</label>
                    <input type="email" required>
                    <label>Mot de passe</label>
                    <input type="password" required>
                    <button type="submit">Créer l'utilisateur</button>
                </form>
            </section>

            <table>
                <thead>
                    <tr><th>ID</th><th>Email</th><th>Rôle</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </main>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
